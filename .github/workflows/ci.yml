name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # The credibility receipt: typecheck + lint + the full test suite (which includes the
  # surface-purity tripwire, the cross-surface parity matrix, the surprise-capability proof,
  # and advertise==enforce), then the publish gates (build + publint + attw). Mirrors
  # `bun run check` so local and CI run identically.
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun run check
      - run: bun run build
      - run: bun run publint
      - run: bun run attw

  # Proves the "Bun-first but not Bun-only" claim mechanically: the BUILT dist must import and
  # run on a clean Node 22 and on Deno, not just on Bun. Each leg runs the same dependency-free
  # smoke against the compiled output resolved through the package `exports` map.
  smoke-node:
    needs: check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: bun install --frozen-lockfile
      - run: bun run build
      - run: node scripts/smoke.mjs

  smoke-deno:
    needs: check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - run: bun install --frozen-lockfile
      - run: bun run build
      - run: deno run --allow-read --allow-env --node-modules-dir scripts/smoke.mjs
